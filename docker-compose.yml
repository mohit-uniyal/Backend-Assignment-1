services:
  postgres:
    container_name: postgres
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    container_name: redis-cache
    image: redis:8.8.0
    ports:
      - "6379:6379"

volumes:
  postgres_data: